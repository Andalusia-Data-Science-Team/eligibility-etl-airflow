services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: airflow_db
    ports:
      - "3308:3309"
    volumes:
      - mysql-db-volume:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  airflow-webserver:
    build: .
    image: eligibility-etl-airflow:Insurance
    restart: always
    depends_on:
      - mysql
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:root123@mysql/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: 7G/RFrMkC8rszm3wyqahkA==
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: "0"
      
      # Gunicorn Worker Configuration
      AIRFLOW__WEBSERVER__WORKERS: "2"
      AIRFLOW__WEBSERVER__WORKER_CLASS: sync
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL: "1800"
      AIRFLOW__WEBSERVER__WORKER_REFRESH_BATCH_SIZE: "1"
      
      # Additional Gunicorn arguments
      GUNICORN_CMD_ARGS: "--timeout 300 --graceful-timeout 120 --max-requests 1000 --max-requests-jitter 50"
      
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 1G

  airflow-scheduler:
    build: .
    image: eligibility-etl-airflow:Insurance
    restart: always
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:root123@mysql/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: 7G/RFrMkC8rszm3wyqahkA==
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: "0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./sql:/opt/airflow/sql
      - ./passcode.json:/opt/airflow/passcode.json
      - ./.env:/opt/airflow/.env
      - airflow-logs:/opt/airflow/logs
    command: scheduler
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 512M

volumes:
  mysql-db-volume:
  airflow-logs: