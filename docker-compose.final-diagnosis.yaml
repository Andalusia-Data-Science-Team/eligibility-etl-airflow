services:
  mysql:
    image: mysql:8.0
    container_name: final-diagnosis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: airflow_db
    ports:
      - "3308:3306"
    volumes:
      - mysql-db-volume-final-diagnosis:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - final-diagnosis-network

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.final-diagnosis
    image: eligibility-etl-airflow:final-diagnosis-only
    container_name: final-diagnosis-init
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:root123@mysql/airflow_db
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
               echo 'Database initialized successfully!'"
    networks:
      - final-diagnosis-network

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.final-diagnosis
    image: eligibility-etl-airflow:final-diagnosis-only
    container_name: final-diagnosis-webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:root123@mysql/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: 7G/RFrMkC8rszm3wyqahkA==
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags/final_diagnosis_etl_pipeline.py:/opt/airflow/dags/final_diagnosis_etl_pipeline.py:ro
      - ./src:/opt/airflow/src:ro
      - ./sql:/opt/airflow/sql:ro
      - ./passcode.json:/opt/airflow/passcode.json:ro
      - ./.env:/opt/airflow/.env:ro
    ports:
      - "8082:8080"
    command: webserver
    networks:
      - final-diagnosis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.final-diagnosis
    image: eligibility-etl-airflow:final-diagnosis-only
    container_name: final-diagnosis-scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-webserver:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:root123@mysql/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: 7G/RFrMkC8rszm3wyqahkA==
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags/final_diagnosis_etl_pipeline.py:/opt/airflow/dags/final_diagnosis_etl_pipeline.py:ro
      - ./src:/opt/airflow/src:ro
      - ./sql:/opt/airflow/sql:ro
      - ./passcode.json:/opt/airflow/passcode.json:ro
      - ./.env:/opt/airflow/.env:ro
    command: scheduler
    networks:
      - final-diagnosis-network

volumes:
  mysql-db-volume-final-diagnosis:
    name: final-diagnosis-mysql-data

networks:
  final-diagnosis-network:
    name: final-diagnosis-network
    driver: bridge